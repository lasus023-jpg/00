<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basis Custom - Support Semua Karakter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; font-size: 24px; text-align: center; margin-bottom: 8px; }
        .subtitle { color: #666; text-align: center; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #555; margin-bottom: 6px; }
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #fafafa;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea { min-height: 60px; resize: vertical; font-family: 'Courier New', monospace; }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 16px 0;
        }
        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-secondary { background: #f0f0f0; color: #555; }
        .btn-secondary:active { background: #e0e0e0; transform: scale(0.97); }
        .result-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            border: 2px dashed #e0e0e0;
            min-height: 50px;
        }
        .result-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .result-value { font-family: 'Courier New', monospace; font-size: 20px; color: #333; margin-top: 4px; word-break: break-all; line-height: 1.6; }
        .info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #1565c0;
            margin: 12px 0;
        }
        .error { background: #ffebee; border-left: 4px solid #f44336; color: #c62828; }
        .hidden { display: none; }
        .char-counter { text-align: right; font-size: 12px; color: #999; margin-top: 4px; }
        .separator-hint {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
            font-style: italic;
        }
        .method-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .method-btn {
            padding: 6px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .method-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .method-btn:active { transform: scale(0.95); }
        @media (max-width: 480px) {
            .container { padding: 16px; }
            input, textarea { font-size: 15px; padding: 10px 12px; }
            .result-value { font-size: 17px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Basis Custom Pro</h1>
        <p class="subtitle">Support SEMUA karakter termasuk spasi, tanda baca, dan simbol regex</p>
        
        <div class="form-group">
            <label>Basis Sumber</label>
            <input type="number" id="sourceBase" value="10" min="2" max="100">
        </div>
        
        <div class="form-group">
            <label>Karakter Custom</label>
            <div class="method-selector">
                <button class="method-btn active" data-method="comma">Koma (,)</button>
                <button class="method-btn" data-method="pipe">Pipe (|)</button>
                <button class="method-btn" data-method="json">JSON Array</button>
                <button class="method-btn" data-method="perchar">Per Karakter</button>
            </div>
            <textarea id="customChars" rows="2">g,j,b,k,l,d,r,a,y,o, ,.,*,+</textarea>
            <div class="char-counter" id="charCount">12 karakter</div>
            <div class="separator-hint" id="separatorHint">💡 Pisahkan dengan koma (,). Contoh: g,j,b, ,.,*,+</div>
        </div>
        
        <div class="form-group">
            <label>Basis Tujuan</label>
            <input type="number" id="targetBase" value="10" min="2" max="100">
        </div>
        
        <div class="form-group">
            <label>Angka yang akan dikonversi</label>
            <input type="text" id="numberInput" placeholder="Masukkan angka..." value="g,b,k">
        </div>
        
        <div class="btn-group">
            <button class="btn-primary" id="convertBtn">🔄 Konversi</button>
            <button class="btn-secondary" id="swapBtn">⇄ Tukar</button>
            <button class="btn-secondary" id="clearBtn">✕ Bersihkan</button>
            <button class="btn-secondary" id="exampleBtn">📝 Contoh</button>
        </div>
        
        <div class="result-box" id="resultBox">
            <div class="result-label">Hasil Konversi</div>
            <div class="result-value" id="resultValue">-</div>
        </div>
        
        <div class="result-box" id="resultBox2" style="display:none;">
            <div class="result-label">Representasi Custom</div>
            <div class="result-value" id="resultValue2">-</div>
        </div>
        
        <div id="infoBox" class="info hidden"></div>
    </div>

    <script>
        (function() {
            'use strict';
            
            let currentMethod = 'comma';
            
            const sourceBaseInput = document.getElementById('sourceBase');
            const customCharsInput = document.getElementById('customChars');
            const targetBaseInput = document.getElementById('targetBase');
            const numberInput = document.getElementById('numberInput');
            const resultValue = document.getElementById('resultValue');
            const resultValue2 = document.getElementById('resultValue2');
            const resultBox2 = document.getElementById('resultBox2');
            const infoBox = document.getElementById('infoBox');
            const charCount = document.getElementById('charCount');
            const separatorHint = document.getElementById('separatorHint');
            
            // Method selector
            document.querySelectorAll('.method-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentMethod = this.dataset.method;
                    
                    const hints = {
                        'comma': '💡 Pisahkan dengan koma (,). Contoh: g,j,b, ,.,*,+',
                        'pipe': '💡 Pisahkan dengan pipe (|). Contoh: g|j|b| |.|*|+',
                        'json': '💡 Format JSON array. Contoh: ["g","j","b"," ",".","*","+"]',
                        'perchar': '💡 Setiap karakter dianggap satu. Contoh: gjb .*+ (termasuk spasi)'
                    };
                    separatorHint.textContent = hints[currentMethod] || hints.comma;
                    updateCharCount();
                });
            });
            
            function parseCustomChars(input) {
                if (!input.trim()) return [];
                
                switch(currentMethod) {
                    case 'json':
                        try {
                            const parsed = JSON.parse(input);
                            if (Array.isArray(parsed)) {
                                return parsed.filter(s => typeof s === 'string' && s.length > 0);
                            }
                            return [];
                        } catch {
                            return [];
                        }
                        
                    case 'pipe':
                        return input.split('|').filter(s => s.length > 0);
                        
                    case 'perchar':
                        // Setiap karakter termasuk spasi
                        return input.split('');
                        
                    case 'comma':
                    default:
                        return input.split(',').map(s => s.trim()).filter(s => s.length > 0);
                }
            }
            
            function updateCharCount() {
                const chars = parseCustomChars(customCharsInput.value);
                charCount.textContent = chars.length + ' karakter';
            }
            
            function validateAndConvert() {
                infoBox.classList.add('hidden');
                infoBox.classList.remove('error');
                
                try {
                    const sourceBase = parseInt(sourceBaseInput.value);
                    const targetBase = parseInt(targetBaseInput.value);
                    const numberStr = numberInput.value;
                    
                    if (!numberStr) {
                        showError('Masukkan angka terlebih dahulu!');
                        return;
                    }
                    
                    if (isNaN(sourceBase) || sourceBase < 2) {
                        showError('Basis sumber harus ≥ 2');
                        return;
                    }
                    
                    if (isNaN(targetBase) || targetBase < 2) {
                        showError('Basis tujuan harus ≥ 2');
                        return;
                    }
                    
                    const customChars = parseCustomChars(customCharsInput.value);
                    
                    if (customChars.length === 0) {
                        showError('Masukkan minimal 1 karakter custom!');
                        return;
                    }
                    
                    // Check duplicate
                    const uniqueChars = new Set(customChars);
                    if (uniqueChars.size !== customChars.length) {
                        showError('Karakter custom tidak boleh duplikat!');
                        return;
                    }
                    
                    updateCharCount();
                    
                    // 🔥 Cek input dengan karakter custom (tanpa regex)
                    let isCustomInput = true;
                    let decimalValue;
                    
                    // Cek semua karakter ada di customChars
                    for (let char of numberStr) {
                        if (!customChars.includes(char)) {
                            isCustomInput = false;
                            break;
                        }
                    }
                    
                    if (isCustomInput && numberStr.length > 0) {
                        decimalValue = convertCustomToDecimal(numberStr, customChars);
                    } else {
                        decimalValue = parseInt(numberStr);
                        if (isNaN(decimalValue)) {
                            showError('Format angka tidak valid! Gunakan angka 0-9 atau karakter custom yang terdaftar.');
                            return;
                        }
                    }
                    
                    const result = convertDecimalToCustom(decimalValue, targetBase, customChars);
                    
                    resultValue.textContent = result;
                    
                    if (isCustomInput && !/^\d+$/.test(numberStr)) {
                        resultValue2.textContent = numberStr + ' (custom) → ' + decimalValue + ' (desimal)';
                        resultBox2.style.display = 'block';
                    } else {
                        resultValue2.textContent = decimalValue + ' (desimal) → ' + result + ' (custom)';
                        resultBox2.style.display = 'block';
                    }
                    
                    showInfo(`Basis ${sourceBase} → Basis ${targetBase} | ${customChars.length} karakter custom`);
                    
                } catch (error) {
                    showError('Terjadi kesalahan: ' + error.message);
                }
            }
            
            function convertCustomToDecimal(customStr, customChars) {
                let result = 0;
                const base = customChars.length;
                
                for (let char of customStr) {
                    const index = customChars.indexOf(char);
                    if (index === -1) {
                        throw new Error(`Karakter '${char}' tidak ditemukan!`);
                    }
                    result = result * base + index;
                }
                
                return result;
            }
            
            function convertDecimalToCustom(decimal, targetBase, customChars) {
                if (decimal === 0) return customChars[0] || '0';
                
                const base = targetBase;
                const chars = customChars;
                let result = '';
                let num = decimal;
                
                while (num > 0) {
                    const remainder = num % base;
                    if (remainder >= chars.length) {
                        throw new Error(`Nilai ${remainder} melebihi jumlah karakter custom (${chars.length})`);
                    }
                    result = chars[remainder] + result;
                    num = Math.floor(num / base);
                }
                
                return result || (chars[0] || '0');
            }
            
            function swapBases() {
                const temp = sourceBaseInput.value;
                sourceBaseInput.value = targetBaseInput.value;
                targetBaseInput.value = temp;
                validateAndConvert();
            }
            
            function clearAll() {
                numberInput.value = '';
                resultValue.textContent = '-';
                resultValue2.textContent = '-';
                resultBox2.style.display = 'none';
                infoBox.classList.add('hidden');
            }
            
            function showExample() {
                sourceBaseInput.value = '10';
                targetBaseInput.value = '10';
                customCharsInput.value = 'g,j,b,k,l,d,r,a,y,o, ,.,*,+';
                numberInput.value = 'g,b,k';
                currentMethod = 'comma';
                document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-method="comma"]').classList.add('active');
                separatorHint.textContent = '💡 Pisahkan dengan koma (,). Contoh: g,j,b, ,.,*,+';
                updateCharCount();
                validateAndConvert();
            }
            
            function showError(message) {
                infoBox.textContent = '⚠️ ' + message;
                infoBox.className = 'info error';
                infoBox.classList.remove('hidden');
                resultValue.textContent = 'Error';
                resultValue2.textContent = '-';
                resultBox2.style.display = 'none';
            }
            
            function showInfo(message) {
                infoBox.textContent = 'ℹ️ ' + message;
                infoBox.className = 'info';
                infoBox.classList.remove('hidden');
            }
            
            document.getElementById('convertBtn').addEventListener('click', validateAndConvert);
            document.getElementById('swapBtn').addEventListener('click', swapBases);
            document.getElementById('clearBtn').addEventListener('click', clearAll);
            document.getElementById('exampleBtn').addEventListener('click', showExample);
            
            numberInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') validateAndConvert();
            });
            
            customCharsInput.addEventListener('input', updateCharCount);
            
            // Auto-convert on change (optional)
            // customCharsInput.addEventListener('change', validateAndConvert);
            
            setTimeout(showExample, 100);
            
        })();
    </script>
</body>
</html>
